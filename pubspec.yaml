name: bz5_companion
description: Toyota BZ5 telemetry & monitoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  permission_handler: ^11.3.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.3
  path: ^1.9.0
  fl_chart: ^0.68.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/ecus/

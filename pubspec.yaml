name: bz5_companion
description: Toyota BZ5 telemetry & monitoring app
publish_to: 'none'
version: 0.1.18+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: 1.32.12
  permission_handler: ^11.3.0
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  path_provider: ^2.1.3
  path: ^1.9.0
  fl_chart: ^0.68.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  # v0.1.11: data export.
  archive: ^3.6.1           # zip encoding for export bundle
  share_plus: ^10.0.0       # system share sheet (USB / cloud / messaging)
  # v0.1.14: in-car DID sweep.
  wakelock_plus: ^1.2.8     # keep screen awake during long sweeps (~55 min)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

# v0.1.8: app icon assets.
# Icons are pre-generated PNGs placed directly in android/app/src/main/res/.
# Source SVG is checked in under assets/icon/icon_source.svg for reference.
# To regenerate icons after design change:
#   1. Edit assets/icon/icon_source.svg
#   2. Regenerate all mipmap-*/ic_launcher*.png using your preferred tool
#      (or pull the icon zip from a v0.1.8+ release in Actions artifacts).

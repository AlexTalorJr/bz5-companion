name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for git rev-list count

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Compute version from git history
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d+ -f1)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          VERSION_NAME="${BASE_VERSION}.${BUILD_NUMBER}"
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "::notice title=Build Version::APK will be built as $VERSION_NAME (versionCode $BUILD_NUMBER)"

      - name: Create Android project files (with valid name)
        run: flutter create --platforms=android --org com.bz5companion --project-name bz5_companion .

      - name: Bump Kotlin version in settings.gradle
        # Flutter 3.27.4's `flutter create` writes Kotlin 1.8.x into the
        # generated android/settings.gradle (pluginManagement -> plugins block,
        # id 'org.jetbrains.kotlin.android' version '1.8.x').
        #
        # Modern Flutter plugins (wakelock_plus 1.4+, package_info_plus 9+, etc.)
        # are compiled with Kotlin 2.x metadata. Kotlin compiler 1.8 can only
        # read up to metadata 1.9 — anything newer fails with "Incompatible
        # classes were found in dependencies".
        #
        # Bumping the Kotlin plugin to 2.1.0 makes the build compatible with
        # current versions of all our deps without pinning individual ones.
        # Java 17 (already configured above) supports Kotlin 2.x.
        run: |
          SETTINGS=android/settings.gradle
          if [ ! -f "$SETTINGS" ]; then
            echo "::error::$SETTINGS not found after flutter create"
            exit 1
          fi
          # Replace the version of the 'org.jetbrains.kotlin.android' plugin.
          # Use Python for predictable regex behaviour across sed flavours.
          python3 - <<'PYEOF'
          import re, sys
          path = 'android/settings.gradle'
          src = open(path).read()
          before = src
          # Match: id "org.jetbrains.kotlin.android" version "X.Y.Z"  (with " or ')
          src = re.sub(
              r'(id\s+["\']org\.jetbrains\.kotlin\.android["\']\s+version\s+["\'])([^"\']+)(["\'])',
              r'\g<1>2.1.0\g<3>',
              src,
          )
          if src == before:
              print('::warning::could not find Kotlin plugin line — Kotlin not bumped')
              sys.exit(0)
          open(path, 'w').write(src)
          print('Kotlin bumped to 2.1.0 in settings.gradle')
          PYEOF
          # Show the result for build log visibility
          grep -A1 "kotlin.android" android/settings.gradle || true

      - name: Decode release keystore
        # Secrets must be set in GitHub repo Settings → Secrets and variables → Actions:
        #   ANDROID_KEYSTORE_BASE64   — base64 of bz5-release.keystore
        #   ANDROID_KEYSTORE_PASSWORD — store password
        #   ANDROID_KEY_ALIAS         — bz5-release
        #   ANDROID_KEY_PASSWORD      — key password (usually same as store)
        # If keystore secret is missing this step skips signing and falls
        # back to Flutter's default debug keystore — APK will still build
        # but won't upgrade in-place over signed builds.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 secret not set — skipping release signing"
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/bz5-release.keystore
          echo "Keystore decoded: $(stat -c%s android/app/bz5-release.keystore) bytes"
          echo "HAS_KEYSTORE=true" >> $GITHUB_ENV

      - name: Configure release signing in build.gradle
        if: env.HAS_KEYSTORE == 'true'
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Inject release signingConfig into the Flutter-generated build.gradle.
          #
          # IMPORTANT: substitute credentials INLINE (not via System.getenv at
          # gradle runtime). Flutter's gradle invocation may not propagate env
          # vars deterministically across platform versions/AGP versions.
          # Inline strings always work.
          #
          # Two patches both required for release signing to take effect:
          #   1. Insert signingConfigs.release { keyAlias..., storeFile..., ... }
          #      block before buildTypes
          #   2. Rewire release buildType: signingConfig signingConfigs.release
          #      (was: signingConfigs.debug, the default Flutter template uses)
          #
          # If either fails, we ABORT THE BUILD with exit 1 rather than silently
          # producing an APK signed with debug key — silent failure caused us
          # to ship v0.1.14.34 with a debug-key APK that couldn't upgrade
          # previous signed installs.
          python3 - <<'PYEOF'
          import os, re, sys
          path = 'android/app/build.gradle'
          if not os.path.exists(path):
              # Maybe Kotlin DSL? AGP can write build.gradle.kts under newer templates.
              alt = 'android/app/build.gradle.kts'
              if os.path.exists(alt):
                  print(f'::error::Found {alt} (Kotlin DSL) instead of build.gradle')
                  print('::error::Workflow patch supports Groovy only. Need to update.')
                  sys.exit(1)
              print(f'::error::{path} not found and no Kotlin DSL variant either')
              sys.exit(1)

          src_original = open(path).read()
          print('--- Original build.gradle (first 80 lines) ---')
          for i, line in enumerate(src_original.split('\n')[:80], 1):
              print(f'{i:3d}: {line}')
          print('--- End of original ---')

          # Read secrets from env so they're substituted INLINE into the
          # gradle file (not looked up at gradle runtime).
          store_pwd = os.environ.get('STORE_PASSWORD', '')
          key_alias = os.environ.get('KEY_ALIAS', '')
          key_pwd = os.environ.get('KEY_PASSWORD', '')

          if not store_pwd or not key_alias or not key_pwd:
              print('::error::One or more keystore secrets are empty:')
              print(f'  STORE_PASSWORD: {"set" if store_pwd else "EMPTY"}')
              print(f'  KEY_ALIAS: {"set" if key_alias else "EMPTY"}')
              print(f'  KEY_PASSWORD: {"set" if key_pwd else "EMPTY"}')
              sys.exit(1)

          # Escape any special chars for Groovy single-quoted strings.
          def escape_groovy(s):
              return s.replace('\\', '\\\\').replace("'", "\\'")

          inject = (
              '\n    signingConfigs {\n'
              '        release {\n'
              f"            keyAlias '{escape_groovy(key_alias)}'\n"
              f"            keyPassword '{escape_groovy(key_pwd)}'\n"
              '            storeFile file("bz5-release.keystore")\n'
              f"            storePassword '{escape_groovy(store_pwd)}'\n"
              '        }\n'
              '    }\n\n'
          )

          # Patch 1: insert signingConfigs block before buildTypes
          src_v1, n1 = re.subn(
              r'(\n\s*)(buildTypes\s*\{)',
              inject + r'\1\2',
              src_original,
              count=1,
          )
          if n1 != 1:
              print(f'::error::Patch 1 failed: could not find "buildTypes {{" '
                    f'pattern in build.gradle (matches: {n1})')
              sys.exit(1)
          print(f'Patch 1: inserted signingConfigs.release block ({n1} replacement)')

          # Patch 2: rewire release buildType signingConfig from debug → release.
          # Try multiple known shapes of the line Flutter templates generate.
          patterns = [
              ('signingConfig signingConfigs.debug',
               'signingConfig signingConfigs.release'),
              ('signingConfig = signingConfigs.debug',
               'signingConfig = signingConfigs.release'),
              ('signingConfig signingConfigs["debug"]',
               'signingConfig signingConfigs["release"]'),
              ("signingConfig signingConfigs['debug']",
               "signingConfig signingConfigs['release']"),
          ]
          src_v2 = src_v1
          patch2_applied = False
          for old, new in patterns:
              if old in src_v2:
                  src_v2 = src_v2.replace(old, new, 1)
                  patch2_applied = True
                  print(f'Patch 2: rewired release buildType using pattern: {old!r}')
                  break

          if not patch2_applied:
              # Show what's in the buildTypes block so we can diagnose
              m = re.search(r'buildTypes\s*\{[^}]*\}', src_v2, re.DOTALL)
              print('::error::Patch 2 failed: no known signingConfig pattern found')
              if m:
                  print('--- buildTypes block contents ---')
                  print(m.group(0))
                  print('--- end ---')
              sys.exit(1)

          open(path, 'w').write(src_v2)
          print('build.gradle patched for release signing')

          # Sanity verification: read it back and confirm both elements present
          final = open(path).read()
          if 'signingConfigs.release' not in final or 'storeFile file("bz5-release.keystore")' not in final:
              print('::error::Patched file does not contain expected markers')
              sys.exit(1)
          if 'signingConfig signingConfigs.debug' in final or 'signingConfig = signingConfigs.debug' in final:
              print('::error::Patched file STILL contains a debug signingConfig — '
                    'rewire patch did not stick')
              sys.exit(1)
          print('Verification: build.gradle release signing configured correctly')
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Show resolved dependencies
        run: flutter pub deps --no-dev --style compact || true

      - name: Generate Drift code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --build-number=${{ env.BUILD_NUMBER }} \
            --build-name=${{ env.VERSION_NAME }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/bz5-companion-${{ env.VERSION_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bz5-companion-${{ env.VERSION_NAME }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
